<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PON Exporter — Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e4e4e7; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #1a1b23; border: 1px solid #2a2b35; border-radius: 12px; padding: 2.5rem; max-width: 420px; width: 100%; text-align: center; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #9ca3af; font-size: 0.9rem; margin-bottom: 1.5rem; }
    button { background: #3b82f6; color: #fff; border: none; border-radius: 8px; padding: 0.75rem 1.5rem; font-size: 1rem; cursor: pointer; width: 100%; transition: background 0.2s; }
    button:hover { background: #2563eb; }
    button:disabled { background: #374151; cursor: not-allowed; }
    .status { margin-top: 1rem; font-size: 0.85rem; color: #9ca3af; }
    .status.error { color: #ef4444; }
    .status.success { color: #22c55e; }
  </style>
</head>
<body>
  <div class="card">
    <h1>PON Exporter</h1>
    <p>Sign in with your Ethereum wallet to access metrics.</p>
    <button id="connect">Connect Wallet</button>
    <div id="status" class="status"></div>
  </div>

  <script src="https://unpkg.com/@walletconnect/modal@2.7.0/dist/index.umd.js"></script>
  <script src="https://unpkg.com/@walletconnect/ethereum-provider@2.17.0/dist/index.umd.js"></script>
  <script>
    const projectId = '{{PROJECT_ID}}';
    const btn = document.getElementById('connect');
    const status = document.getElementById('status');

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      status.className = 'status';
      status.textContent = 'Connecting wallet…';

      try {
        const provider = await window.EthereumProvider.default.init({
          projectId,
          chains: [1],
          showQrModal: true,
        });

        await provider.enable();
        const accounts = provider.accounts;
        if (!accounts || accounts.length === 0) throw new Error('No accounts returned');
        const address = accounts[0];

        status.textContent = 'Requesting challenge…';
        const nonceResp = await fetch('/auth/nonce');
        const nonce = await nonceResp.text();

        const domain = window.location.host;
        const origin = window.location.origin;
        const issued = new Date().toISOString();
        const message = [
          `${domain} wants you to sign in with your Ethereum account:`,
          address,
          '',
          'Sign in to PON Exporter',
          '',
          `URI: ${origin}`,
          'Version: 1',
          'Chain ID: 1',
          `Nonce: ${nonce}`,
          `Issued At: ${issued}`,
        ].join('\n');

        status.textContent = 'Sign the message in your wallet…';
        const signature = await provider.request({
          method: 'personal_sign',
          params: [message, address],
        });

        status.textContent = 'Verifying…';
        const verifyResp = await fetch('/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ message, signature }),
        });

        if (verifyResp.ok) {
          status.className = 'status success';
          status.textContent = 'Authenticated! Redirecting…';
          setTimeout(() => { window.location.href = '/'; }, 500);
        } else {
          const err = await verifyResp.text();
          throw new Error(err);
        }
      } catch (e) {
        status.className = 'status error';
        status.textContent = e.message || 'Authentication failed';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
